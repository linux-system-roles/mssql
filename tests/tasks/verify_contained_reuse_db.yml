# SPDX-License-Identifier: MIT
---
- name: Verify that contained AG is configured
  vars:
    __mssql_sql_files_to_input:
      - ag_is_contained.j2
  include_role:
    name: linux-system-roles.mssql
    tasks_from: input_sql_files.yml
    public: true

- name: Assert the contained status is correct
  assert:
    that: "{{ __mssql_is_contained }} in __mssql_sqlcmd_input.stdout"

- name: Verify reuse_system_db for AG
  vars:
    __mssql_sql_files_to_input:
      - ag_is_reuse_system_db.j2
  include_role:
    name: linux-system-roles.mssql
    tasks_from: input_sql_files.yml
    public: true

- name: Assert the contained status is correct
  assert:
    that: "{{ __mssql_is_reuse_system_db }} in __mssql_sqlcmd_input.stdout"
